# Make Bluetooth stronger
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Power management
# https://zmk.dev/docs/config/power
# disable rgb and display, bluetooth remains active
CONFIG_ZMK_IDLE_TIMEOUT=20000 #d 30000
# deep sleep, disable bluetooth, requires a few seconds to wake up
CONFIG_ZMK_SLEEP=y #d n
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000 #d 900000

# Zephyr ble settings
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=48
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=80
CONFIG_BT_PERIPHERAL_PREF_LATENCY=4

# ZMK Studio
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=y

# mouse
CONFIG_ZMK_POINTING=y
